{% extends 'base.html' %}
{% load static %}
{% block content %}

<div class="page-header">
    <div>
        <div class="page-title">Reports</div>
        <div class="page-subtitle">Safety metrics and compliance trends</div>
    </div>
</div>

<div class="charts-grid">
    <div class="chart-box full-width">
        <div class="chart-title">Violations by Day — Last 7 Days</div>
        <canvas id="chartByDay" height="60"></canvas>
    </div>

    <div class="chart-box">
        <div class="chart-title">Violations by Type</div>
        <canvas id="chartByType" height="180"></canvas>
    </div>

    <div class="chart-box">
        <div class="chart-title">Compliance Trend — Last 4 Weeks</div>
        <canvas id="chartCompliance" height="180"></canvas>
    </div>
</div>

{% endblock %}

{% block extra_js %}
<script>
const CHART_DEFAULTS = {
    color: '#8D99A8',
    borderColor: '#202938',
    gridColor: 'rgba(32,41,56,0.8)',
};

Chart.defaults.color = CHART_DEFAULTS.color;
Chart.defaults.borderColor = CHART_DEFAULTS.borderColor;

new Chart(document.getElementById('chartByDay'), {
    type: 'bar',
    data: {
        labels: ['Mon', 'Tue', 'Wed', 'Thu', 'Fri', 'Sat', 'Sun'],
        datasets: [{
            label: 'Violations',
            data: [8, 14, 6, 11, 9, 3, 12],
            backgroundColor: 'rgba(239,68,68,0.5)',
            borderColor: '#EF4444',
            borderWidth: 1,
            borderRadius: 2,
        }]
    },
    options: {
        plugins: { legend: { display: false } },
        scales: {
            y: { grid: { color: CHART_DEFAULTS.gridColor }, beginAtZero: true },
            x: { grid: { display: false } }
        }
    }
});

new Chart(document.getElementById('chartByType'), {
    type: 'doughnut',
    data: {
        labels: ['No Helmet', 'No Vest', 'No Glasses'],
        datasets: [{
            data: [65, 20, 15],
            backgroundColor: ['rgba(239,68,68,0.7)', 'rgba(245,158,11,0.7)', 'rgba(37,99,235,0.7)'],
            borderColor: ['#EF4444', '#F59E0B', '#2563EB'],
            borderWidth: 1,
        }]
    },
    options: {
        plugins: {
            legend: {
                position: 'bottom',
                labels: { padding: 16, font: { size: 12 } }
            }
        },
        cutout: '65%',
    }
});

new Chart(document.getElementById('chartCompliance'), {
    type: 'line',
    data: {
        labels: ['Week 1', 'Week 2', 'Week 3', 'Week 4'],
        datasets: [{
            label: 'Compliance %',
            data: [89, 92, 95, 97.2],
            borderColor: '#22C55E',
            backgroundColor: 'rgba(34,197,94,0.08)',
            borderWidth: 2,
            pointBackgroundColor: '#22C55E',
            pointRadius: 4,
            tension: 0.3,
            fill: true,
        }]
    },
    options: {
        plugins: { legend: { display: false } },
        scales: {
            y: {
                grid: { color: CHART_DEFAULTS.gridColor },
                min: 80,
                max: 100,
                ticks: { callback: v => v + '%' }
            },
            x: { grid: { display: false } }
        }
    }
});
</script>
{% endblock %}
