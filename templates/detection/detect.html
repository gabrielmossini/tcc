{% extends 'base.html' %}
{% load static %}
{% block content %}
{% if request.user.is_authenticated %}

<div class="page-header">
    <div>
        <div class="page-title">Monitoramento</div>
        <div class="page-subtitle">Detecção Ao Vivo de EPIs</div>
    </div>
    <div class="page-actions">
        <button id="start-camera" class="btn btn-primary">
            <i class="fa-solid fa-video"></i> Start Feed
        </button>
    </div>
</div>

<div class="monitoring-layout">
    <div class="feed-panel">
        <div id="feed-placeholder" class="feed-placeholder">
            <i class="fa-solid fa-video-slash"></i>
            <span>Camera Inativa - Clique em 'Começar Feed'</span>
        </div>
        <div id="video-container" style="display: none">
            <div id="alerts"></div>
            <img id="video" class="camera-feed" />
            <div id="status"></div>
            <div class="feed-controls">
                <button id="mute-button" class="btn-icon muted">
                    <i class="fa-solid fa-volume-xmark"></i>
                </button>
                <button id="unmute-button" class="btn-icon" style="display: none;">
                    <i class="fa-solid fa-volume-high"></i>
                </button>
                <button id="stop-camera" class="btn btn-danger" style="display: none; margin-left: auto;">
                    <i class="fa-solid fa-stop"></i> Parar
                </button>
            </div>
        </div>
    </div>

    <div class="events-panel">
        <div class="section-header">
            <span class="section-title">Eventos Ativos</span>
            <!--<span class="live-badge">LIVE</span>-->
        </div>
        <div id="active-events" class="events-list">
            <!-- <div class="events-empty">Sem violações ativas detectadas</div>-->
        </div>

        <div class="section-header mt-4">
            <span class="section-title">Detecções Per-Frame</span>
        </div>
        <table class="data-table" id="detection-table">
            <thead>
                <tr>
                    <th>EPI</th>
                    <th id="sort-detections" onclick="sortTable()" style="cursor:pointer;">Contagem ↕</th>
                </tr>
            </thead>
            <tbody id="detection-table-body"></tbody>
        </table>
    </div>
</div>

<div class="chart-panel">
    <canvas id="detectionChart" height="70"></canvas>
</div>

<script src="{% static 'js/chart.js' %}"></script>
<script src="{% static 'js/camera.js' %}"></script>
<script>
(function () {
    var startBtn    = document.getElementById('start-camera');
    var stopBtn     = document.getElementById('stop-camera');
    var placeholder = document.getElementById('feed-placeholder');

    if (startBtn) {
        startBtn.addEventListener('click', function () {
            placeholder.style.display = 'none';
        });
    }
    if (stopBtn) {
        stopBtn.addEventListener('click', function () {
            placeholder.style.display = 'flex';
        });
    }
}());
</script>

{% endif %}
{% endblock %}
