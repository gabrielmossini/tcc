{% extends 'base.html' %}
{% load static %}
{% block main_class %}login-main{% endblock %}
{% block content %}

<div class="login-shell">
    <div class="login-left">
        <div class="login-product-name">AEGIS</div>
        <div class="login-product-tagline">Operational Safety Intelligence</div>
        <div class="login-pitch">
            <div class="login-pitch-line"><strong>Monitor.</strong></div>
            <div class="login-pitch-line"><strong>Detect.</strong></div>
            <div class="login-pitch-line"><strong>Prevent.</strong></div>
        </div>
    </div>

    <div class="login-right">
        <div class="login-form-label">Platform Access</div>

        {% if mensagem %}
        <div class="login-error">{{ mensagem }}</div>
        {% endif %}

        <form name="formPainel" id="formPainel" method="post">
            {% csrf_token %}
            <div class="login-field">
                <input class="login-input" type="text" name="user" id="name" placeholder="Username" autocomplete="username" />
            </div>
            <div class="login-field">
                <input class="login-input" type="password" name="password" id="password" placeholder="Password" autocomplete="current-password" />
            </div>
            <button type="submit" class="login-submit">Access Platform</button>
        </form>
    </div>
</div>

{% endblock %}
