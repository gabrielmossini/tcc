{% load static %}
<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>AEGIS — Operational Safety Intelligence</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" crossorigin="anonymous"/>
    <link href="https://cdn.datatables.net/v/bs5/jq-3.7.0/jszip-3.10.1/dt-1.13.5/b-2.4.1/b-html5-2.4.1/b-print-2.4.1/datatables.min.css" rel="stylesheet"/>
    <link rel="stylesheet" href="{% static 'css/styles.css' %}" />
    <link rel="icon" href="/static/img/icon.ico"/>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">

    <script src="https://kit.fontawesome.com/61b998a44e.js" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

    {% block extra_head %}{% endblock %}
</head>
<body>
<div class="app-shell">
    {% if request.user.is_authenticated %}
    <aside class="sidebar">
        <div class="sidebar-brand">
            <span class="sidebar-brand-name">AEGIS</span>
            <span class="sidebar-brand-sub">Novamérica</span>
        </div>
        <nav class="sidebar-nav">
            <a href="{% url 'home' %}" class="nav-item {% if request.resolver_match.url_name == 'home' %}active{% endif %}">
                <i class="fa-solid fa-chart-line"></i>
                <span>Dashboard</span>
            </a>
            <a href="{% url 'detect' %}" class="nav-item {% if request.resolver_match.url_name == 'detect' %}active{% endif %}">
                <i class="fa-solid fa-video"></i>
                <span>Monitoramento</span>
            </a>
            <!--
            <a href="{% url 'events' %}" class="nav-item {% if request.resolver_match.url_name == 'events' %}active{% endif %}">
                <i class="fa-solid fa-triangle-exclamation"></i>
                <span>Events</span>
            </a>
            <a href="{% url 'reports' %}" class="nav-item {% if request.resolver_match.url_name == 'reports' %}active{% endif %}">
                <i class="fa-solid fa-chart-column"></i>
                <span>Reports</span>
            </a>
            <a href="{% url 'cameras' %}" class="nav-item {% if request.resolver_match.url_name == 'cameras' %}active{% endif %}">
                <i class="fa-solid fa-camera"></i>
                <span>Cameras</span>
            </a>
            -->
        </nav>
        <div class="sidebar-footer">
            <a href="{% url 'logout' %}" class="nav-item nav-logout">
                <i class="fa-solid fa-right-from-bracket"></i>
                <span>Sair</span>
            </a>
        </div>
    </aside>
    {% endif %}

    <main class="main-content {% if not request.user.is_authenticated %}full-width{% endif %} {% block main_class %}{% endblock %}">
        {% block content %}
        {% endblock %}
    </main>

</div>

<script src="{% static 'js/utils.js' %}"></script>
<script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/pdfmake/0.2.7/pdfmake.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/pdfmake/0.2.7/vfs_fonts.js"></script>
<script src="https://cdn.datatables.net/v/bs5/jq-3.7.0/jszip-3.10.1/dt-1.13.5/b-2.4.1/b-html5-2.4.1/b-print-2.4.1/datatables.min.js"></script>
{% block extra_js %}{% endblock %}
</body>
</html>
